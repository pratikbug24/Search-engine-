<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile - Smart Search</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            transition: 0.3s;
        }

        .light { background: #f8f9fa; color: black; }
        .dark { background: #121212; color: white; }

        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 20px;
        }

        .edit-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .dark .edit-card { background: #1e1e1e; }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #1a73e8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .dark label { color: #ddd; }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
        }

        .dark input { 
            background: #2a2a2a; 
            color: white; 
            border-color: #444;
        }

        input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #1a73e8;
            color: white;
            border: none;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #1557b0;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ccc;
            transition: 0.2s;
        }

        .dark .btn-secondary { 
            background: #2a2a2a; 
            color: #ddd;
            border-color: #444;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .dark .btn-secondary:hover { background: #3a3a3a; }

        .avatar-preview {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar-preview img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #1a73e8;
            object-fit: cover;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #1a73e8;
            text-decoration: none;
            font-size: 16px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 20px;
            cursor: pointer;
        }

        .dark .theme-toggle { background: #2a2a2a; color: white; }

        .note {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>

<body class="light">

<a href="/profile" class="back-link">← Back to Profile</a>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="container">
    <div class="edit-card">
        <h1>✏️ Edit Profile</h1>
        
        <div class="avatar-preview">
            <img src="{{ user.picture }}" alt="Profile Picture">
        </div>

        <form method="POST" action="/edit-profile">
            <div class="form-group">
                <label for="name">Username</label>
                <input type="text" id="name" name="name" value="{{ user.name }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" required>
                <div class="note">Note: Email cannot be changed for Google accounts</div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/profile" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleTheme() {
        document.body.classList.toggle("dark");
        document.body.classList.toggle("light");
        localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    }

    // Load saved theme
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.remove("light");
        document.body.classList.add("dark");
    }
</script>

</body>
</html>
