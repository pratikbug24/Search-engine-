<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1a73e8, #4285f4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 5px rgba(26,115,232,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #1a73e8;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1558b0;
        }

        .google-btn {
            background: white;
            color: black;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        .google-btn:hover {
            background: #f1f1f1;
        }

        a {
            color: #1a73e8;
            text-decoration: none;
        }

        p {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🔐 Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a href="/login/google">
        <button class="google-btn">Login with Google</button>
    </a>

    <p>Don't have an account? <a href="/signup">Sign Up</a></p>
</div>

</body>
</html>
