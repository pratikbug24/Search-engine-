<!DOCTYPE html>
<html>
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2644619789277551"
     crossorigin="anonymous"></script>
    <title>Signup</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #34a853, #66bb6a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #34a853;
            box-shadow: 0 0 5px rgba(52,168,83,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #34a853;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2c8f47;
        }

        a {
            color: #34a853;
            text-decoration: none;
        }

        p {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📝 Sign Up</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Create Account</button>
    </form>

    <p>Already have an account? <a href="/login">Login</a></p>
</div>

</body>
</html>
